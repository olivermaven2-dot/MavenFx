<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maven FX PRO Dashboard</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial;
  background: #0d1117;
  color: #e6edf3;
  zoom: 0.9;
}

/* FLOAT BUTTON */
.floating-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #238636;
  color: white;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 999;
}

/* MINI MODE */
.mini {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 50vh;
  overflow-y: auto;
  z-index: 998;
}

/* DASHBOARD */
.dashboard {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
  min-height: 100vh;
  max-width: 500px;
  margin: auto;
}

.panel {
  background: #161b22;
  padding: 10px;
  border-radius: 10px;
}

.full { grid-column: span 2; }

h2 { margin-bottom: 8px; font-size: 16px; }

select, button {
  width: 100%;
  padding: 8px;
  margin-top: 8px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
}

button {
  background: #238636;
  color: white;
  cursor: pointer;
}

.signal-box {
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  padding: 12px;
  border-radius: 10px;
  background: #0d1117;
}

.over { color: yellow; }
.under { color: orange; }
.enter.over { color: lime; }
.enter.under { color: red; }

#stream {
  margin-top: 8px;
  background: #0d1117;
  padding: 8px;
  border-radius: 6px;
  height: 60px;
  overflow-x: auto;
  white-space: nowrap;
  font-size: 14px;
}

.stat { font-size: 14px; margin-top: 6px; }

@media (max-width: 768px) {
  body { zoom: 0.85; }
  .dashboard { grid-template-columns: 1fr; max-width: 100%; }
  .full { grid-column: span 1; }
}
</style>
</head>

<body>

<div class="floating-btn" onclick="toggleMini()">⚡</div>

<div id="app" class="dashboard">

  <div class="panel">
    <h2>⚙️ Controls</h2>
    <select id="market">
      <option value="R_10">Volatility 10</option>
      <option value="R_25">Volatility 25</option>
      <option value="R_50">Volatility 50</option>
      <option value="R_75">Volatility 75</option>
      <option value="R_100">Volatility 100</option>
      <option value="1HZ10V">V10 (1s)</option>
      <option value="1HZ25V">V25 (1s)</option>
      <option value="1HZ50V">V50 (1s)</option>
      <option value="1HZ75V">V75 (1s)</option>
      <option value="1HZ100V">V100 (1s)</option>
      <option value="JD10">Jump 10</option>
      <option value="JD25">Jump 25</option>
      <option value="JD50">Jump 50</option>
      <option value="JD75">Jump 75</option>
      <option value="JD100">Jump 100</option>
    </select>
    <button onclick="connect()">Connect</button>
    <div class="stat">Status: <span id="status">Disconnected</span></div>
  </div>

  <div class="panel">
    <h2>📊 Market Data</h2>
    <div class="stat">Price: <span id="price">-</span></div>
    <div class="stat">Digit: <span id="digit">-</span></div>
    <div class="stat">Cluster: <span id="cluster">-</span></div>
    <div class="stat">Over 1: <span id="over">0%</span></div>
    <div class="stat">Under 8: <span id="under">0%</span></div>
    <div class="stat">Best Over: <span id="safeOver">-</span></div>
    <div class="stat">Best Under: <span id="safeUnder">-</span></div>
  </div>

  <div class="panel full">
    <h2>🚨 Signal</h2>
    <div id="signal" class="signal-box">WAIT</div>
  </div>

  <div class="panel full">
    <h2>📈 Digit Stream</h2>
    <div id="stream"></div>
  </div>

</div>

<script>
let ws;
let digits = [];
let counts = Array(10).fill(0);
const maxDigits = 50;

let tickWait = false;
let lastSignal = "";

/* SOUND */
function playBeep(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.type = "sine";
  osc.frequency.setValueAtTime(800, ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.15);
}

/* MINI MODE */
function toggleMini(){
  const app = document.getElementById("app");
  app.classList.toggle("mini");
}

/* COMBOS */
const overCombos = [[1,3],[2,4],[3,5],[4,6],[5,7],[6,8]];
const underCombos = [[1,6],[2,6],[2,7],[4,7],[5,7]];

function connect(){
  const market = document.getElementById("market").value;
  const status = document.getElementById("status");

  if(ws) ws.close();

  digits=[];
  counts.fill(0);
  tickWait=false;
  lastSignal="";

  status.innerText="Connecting...";

  ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

  ws.onopen=()=>{
    status.innerText="Connected to "+market;
    ws.send(JSON.stringify({ticks:market,subscribe:1}));
  };

  ws.onmessage=(msg)=>{
    const data=JSON.parse(msg.data);
    if(data.tick){
      const price=data.tick.quote;
      const lastDigit=parseInt(price.toString().slice(-1));

      document.getElementById("price").innerText=price;
      document.getElementById("digit").innerText=lastDigit;

      updateDigits(lastDigit);
      calculateProbability();
      suggestSafestCombo();
      analyzeMarket();
    }
  };

  ws.onerror=()=> status.innerText="❌ Error";
  ws.onclose=()=> status.innerText="Disconnected";
}

function updateDigits(d){
  digits.push(d);
  counts[d]++;
  if(digits.length>maxDigits){
    const old=digits.shift();
    counts[old]--;
  }

  document.getElementById("stream").innerText=digits.join(" ");

  const recent = digits.slice(-10);
  const high = recent.filter(x=>x>=7).length;
  const low = recent.filter(x=>x<=1).length;

  let cluster="Mid (2-6)";
  if(high>=6) cluster="High (7-9)";
  else if(low>=6) cluster="Low (0-1)";

  document.getElementById("cluster").innerText=cluster;
}

function calculateProbability(){
  const total=digits.length||1;
  const overProb=counts.slice(2).reduce((a,b)=>a+b,0)/total*100;
  const underProb=counts.slice(0,8).reduce((a,b)=>a+b,0)/total*100;

  document.getElementById("over").innerText=overProb.toFixed(1)+"%";
  document.getElementById("under").innerText=underProb.toFixed(1)+"%";

  return {overProb,underProb};
}

function scoreCombo(combo){ return combo.reduce((sum,d)=>sum+counts[d],0); }

function suggestSafestCombo(){
  let bestOver=overCombos[0];
  let bestUnder=underCombos[0];

  overCombos.forEach(c=>{ if(scoreCombo(c)>scoreCombo(bestOver)) bestOver=c; });
  underCombos.forEach(c=>{ if(scoreCombo(c)>scoreCombo(bestUnder)) bestUnder=c; });

  document.getElementById("safeOver").innerText=bestOver.join("-");
  document.getElementById("safeUnder").innerText=bestUnder.join("-");
}

/* 🎯 STRONG FILTER */
function isStrongSetup(prob, threshold){
  return prob >= (threshold + 5); // only A+ setups
}

function analyzeMarket(){
  const signal=document.getElementById("signal");

  if(digits.length<15){
    signal.innerText="⏳ WAIT";
    return;
  }

  const {overProb,underProb}=calculateProbability();
  const cluster=document.getElementById("cluster").innerText;

  let overThreshold=80, underThreshold=80;

  const strongestOver = isStrongSetup(overProb, overThreshold);
  const strongestUnder = isStrongSetup(underProb, underThreshold);

  if(tickWait){
    if(strongestOver){
      signal.innerText=`🚀 OVER 1 ENTER (${overProb.toFixed(1)}%)`;
      signal.className="signal-box enter over";
      if(lastSignal!=="over"){ playBeep(); lastSignal="over"; }
    }
    else if(strongestUnder){
      signal.innerText=`🔥 UNDER 8 ENTER (${underProb.toFixed(1)}%)`;
      signal.className="signal-box enter under";
      if(lastSignal!=="under"){ playBeep(); lastSignal="under"; }
    }
    else{
      signal.innerText="⏳ WAIT";
      signal.className="signal-box";
      lastSignal="";
    }
    tickWait=false;
    return;
  }

  if(strongestOver){
    signal.innerText="🚀 STRONG OVER SETUP";
    signal.className="signal-box over";
    tickWait=true;
  }
  else if(strongestUnder){
    signal.innerText="🔥 STRONG UNDER SETUP";
    signal.className="signal-box under";
    tickWait=true;
  }
  else{
    signal.innerText="⏳ WAIT";
    signal.className="signal-box";
    tickWait=false;
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maven FX PRO Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
  background: linear-gradient(145deg, #0b0f14, #131921);
  color: #e6edf3; 
  zoom: 0.9; 
}
.floating-btn { 
  position: fixed; 
  bottom: 15px; 
  right: 15px; 
  background: #238636; 
  color: white; 
  padding: 12px; 
  border-radius: 50%; 
  cursor: pointer; 
  z-index: 999; 
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  transition: transform 0.2s;
}
.floating-btn:hover { transform: scale(1.1); }
.mini { position: fixed; bottom: 0; left: 0; width: 100%; height: 50vh; overflow-y: auto; z-index: 998; }
.dashboard { 
  display: grid; 
  grid-template-columns: 1fr 1fr; 
  gap: 15px; 
  padding: 15px; 
  min-height: 100vh; 
  max-width: 600px; 
  margin: auto; 
}
.panel { 
  background: linear-gradient(145deg, #161b22, #1d232c);
  padding: 15px; 
  border-radius: 12px; 
  box-shadow: 0 8px 20px rgba(0,0,0,0.6);
  transition: transform 0.2s;
}
.panel:hover { transform: translateY(-2px); }
.full { grid-column: span 2; }
h2 { 
  margin-bottom: 10px; 
  font-size: 17px; 
  font-weight: 600; 
  color: #f0f6fc;
}
select, button { 
  width: 100%; 
  padding: 10px; 
  margin-top: 8px; 
  border-radius: 8px; 
  border: none; 
  font-size: 14px; 
}
button { 
  background: #238636; 
  color: white; 
  cursor: pointer; 
  box-shadow: 0 4px 8px rgba(0,0,0,0.4);
  transition: background 0.2s, transform 0.2s;
}
button:hover { 
  background: #2ea54b; 
  transform: translateY(-2px);
}
.signal-box { 
  text-align: center; 
  font-size: 18px; 
  font-weight: bold; 
  padding: 14px; 
  border-radius: 12px; 
  background: #0d1117; 
  box-shadow: inset 0 0 10px rgba(0,255,0,0.1);
}
.over { color: #ffd700; }
.under { color: #ff7f50; }
.enter.over { color: #32cd32; }
.enter.under { color: #ff4500; }
#stream { 
  margin-top: 8px; 
  background: #0d1117; 
  padding: 10px; 
  border-radius: 8px; 
  height: 60px; 
  overflow-x: auto; 
  white-space: nowrap; 
  font-size: 14px; 
  box-shadow: inset 0 0 5px rgba(255,255,255,0.1);
}
.stat { font-size: 14px; margin-top: 6px; }
.flash { 
  animation: flashAnim 0.8s infinite; 
  font-weight: bold; 
  color: #32cd32;
}
@keyframes flashAnim { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
.panel.full:first-of-type { 
  font-size: 22px; 
  font-weight: 700; 
  text-align: center; 
  background: linear-gradient(135deg, #0b0f14, #1e2733);
  color: #ffd700; 
  margin-bottom: 15px; 
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
@media (max-width: 768px) {
  body { zoom: 0.85; }
  .dashboard { grid-template-columns: 1fr; max-width: 100%; }
  .full { grid-column: span 1; }
}
</style>
</head>
<body>

<div class="panel full">
  💎 Maven FX
</div>

<div id="app" class="dashboard">

  <div class="floating-btn" onclick="toggleMini()">⚡</div>

  <div class="panel">
    <h2>⚙️ Controls</h2>
    <select id="market">
      <option value="R_10">Volatility 10</option>
      <option value="R_25">Volatility 25</option>
      <option value="R_50">Volatility 50</option>
      <option value="R_75">Volatility 75</option>
      <option value="R_100">Volatility 100</option>
      <option value="1HZ10V">V10 (1s)</option>
      <option value="1HZ25V">V25 (1s)</option>
      <option value="1HZ50V">V50 (1s)</option>
      <option value="1HZ75V">V75 (1s)</option>
      <option value="1HZ100V">V100 (1s)</option>
      <option value="JD10">Jump 10</option>
      <option value="JD25">Jump 25</option>
      <option value="JD50">Jump 50</option>
      <option value="JD75">Jump 75</option>
      <option value="JD100">Jump 100</option>
    </select>
    <button onclick="connect()">Connect</button>
    <div class="stat">Status: <span id="status">Disconnected</span></div>
  </div>

  <div class="panel">
    <h2>📊 Market Data</h2>
    <div class="stat">Price: <span id="price">-</span></div>
    <div class="stat">Last Tick Digit: <span id="digit">-</span></div>
    <div class="stat">Cluster: <span id="cluster">-</span></div>
    <div class="stat">Over 1: <span id="over">0%</span></div>
    <div class="stat">Under 8: <span id="under">0%</span></div>
  </div>

  <div class="panel full">
    <h2>🚨 Signal</h2>
    <div id="signal" class="signal-box">WAIT</div>
    <div id="countdown" class="signal-box" style="margin-top:5px; background:#0d1117; font-size:16px; color:#ccc;"></div>
  </div>

  <div class="panel full">
    <h2>🛡️ Entry Filter</h2>
    <div class="stat">Last 5 Digits: <span id="last5">-</span></div>
    <div class="stat">Under 8: <span id="underFilter">-</span></div>
    <div class="stat">Over 1: <span id="overFilter">-</span></div>
  </div>

  <div class="panel full">
    <h2>🎯 Entry Digit</h2>
    <div class="stat">Strongest Entry: <span id="entryStrongest">-</span></div>
  </div>

  <div class="panel full">
    <h2>📈 Digit Stream</h2>
    <div id="stream"></div>
  </div>

  <div class="panel full">
    <h2>📊 Momentum Score</h2>
    <div class="stat">Over 1: <span id="momentumOver">0%</span></div>
    <div style="background:#222; height:10px; border-radius:6px; margin-bottom:6px;">
      <div id="barOver" style="height:100%; width:0%; background:#32cd32; border-radius:6px;"></div>
    </div>
    <div class="stat">Under 8: <span id="momentumUnder">0%</span></div>
    <div style="background:#222; height:10px; border-radius:6px;">
      <div id="barUnder" style="height:100%; width:0%; background:#ff4500; border-radius:6px;"></div>
    </div>
  </div>

</div>

<script>
let ws, digits=[], counts=Array(10).fill(0), maxDigits=50;
let spikeDetected=false, lastSignal="", beepReady=true;
const adaptiveWindow=15, spikeFactor=1.7;

// 🔹 Helpers
function toggleMini(){ document.getElementById("app").classList.toggle("mini"); }
function playBeep(type){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  osc.type="sine";
  osc.frequency.setValueAtTime(type==="over"?900:type==="under"?600:750,ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.15);
}

// 🔹 Connect WS
function connect(){
  const market=document.getElementById("market").value;
  const status=document.getElementById("status");
  if(ws) ws.close();
  digits=[]; counts.fill(0); spikeDetected=false; lastSignal=""; beepReady=true;

  status.innerText="Connecting...";
  ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");
  ws.onopen=()=>{status.innerText="Connected to "+market; ws.send(JSON.stringify({ticks:market,subscribe:1}));};
  ws.onmessage=(msg)=>{
    const data=JSON.parse(msg.data);
    if(data.tick){
      const price=data.tick.quote;
      document.getElementById("price").innerText=price;
      const lastDigit=parseInt(price.toFixed(2).replace('.','').slice(-1),10);
      document.getElementById("digit").innerText=lastDigit;
      updateDigits(lastDigit);
    }
  };
  ws.onerror=()=>status.innerText="❌ Error";
  ws.onclose=()=>status.innerText="Disconnected";
}
document.getElementById("market").addEventListener("change", connect);
window.addEventListener("load", connect);

// 🔹 Digits Update
function updateDigits(d){
  digits.push(d);
  counts[d]++;
  if(digits.length>maxDigits){ counts[digits.shift()]--; }
  document.getElementById("stream").innerHTML=digits.map(x=>x===0?`<span style="color:#00ffff;font-weight:bold;">0</span>`:x).join(" ");

  detectAdaptiveSpike(d);
  calculateProbability();
  calculateMomentumScore();
  analyzeMarket();
  updateCluster();
  updateEntryFilterAndDigit(); // <-- only after signal
}

// 🔹 Adaptive Spike
function detectAdaptiveSpike(lastDigit){
  if(digits.length<2) return false;
  const recent=digits.slice(-adaptiveWindow);
  if(recent.length<2) return false;
  const diffs=[];
  for(let i=1;i<recent.length;i++) diffs.push(Math.abs(recent[i]-recent[i-1]));
  const avgDiff=diffs.reduce((a,b)=>a+b,0)/diffs.length;
  const threshold=avgDiff*spikeFactor;
  spikeDetected=Math.abs(lastDigit-recent[recent.length-2])>=threshold;
  return spikeDetected;
}

// 🔹 Probability & Momentum
function calculateProbability(){
  const total=digits.length||1;
  const overCount=counts.slice(2).reduce((a,b)=>a+b,0);
  const underCount=counts.slice(0,8).reduce((a,b)=>a+b,0);
  const overProb=(overCount/total)*100;
  const underProb=(underCount/total)*100;
  document.getElementById("over").innerText=overProb.toFixed(1)+"%";
  document.getElementById("under").innerText=underProb.toFixed(1)+"%";
  return {overProb, underProb};
}
function calculateMomentumScore(){
  const last10=digits.slice(-10);
  if(last10.length<5) return {overScore:0,underScore:0};
  const overPressure=last10.filter(x=>x>=4 && x<=9).length;
  const underPressure=last10.filter(x=>x>=0 && x<=5).length;
  const overScore=Math.min(100,(overPressure/10)*100);
  const underScore=Math.min(100,(underPressure/10)*100);
  document.getElementById("momentumOver").innerText=overScore+"%";
  document.getElementById("barOver").style.width=overScore+"%";
  document.getElementById("momentumUnder").innerText=underScore+"%";
  document.getElementById("barUnder").style.width=underScore+"%";
  return {overScore, underScore};
}

// 🔹 Cluster Calculation
function updateCluster(){
  const last5 = digits.slice(-5);
  if(last5.length === 0) return;
  const avg = last5.reduce((a,b)=>a+b,0)/last5.length;
  let cluster="";
  if(avg <= 3) cluster="Low";
  else if(avg >=7) cluster="High";
  else cluster="Mid";
  document.getElementById("cluster").innerText = cluster;
  return cluster;
}

// 🔹 Market Analysis
function analyzeMarket(){
  if(digits.length<15 || spikeDetected){ 
    document.getElementById("signal").innerText="⏳ WAIT"; 
    document.getElementById("signal").className="signal-box"; 
    lastSignal=""; return; 
  }
  const {overProb, underProb}=calculateProbability();
  const {overScore, underScore}=calculateMomentumScore();
  const cluster = updateCluster();

  let signal="", cls="";
  if(overProb>=80 && overScore>=60 && overProb>underProb && !cluster.includes("Low")){
    signal=`OVER 1 SETUP (${overProb.toFixed(1)}%)`;
    cls="over"; if(lastSignal!==signal) playBeep("over");
  } else if(underProb>=80 && underScore>=60 && underProb>overProb && !cluster.includes("High")){
    signal=`UNDER 8 SETUP (${underProb.toFixed(1)}%)`;
    cls="under"; if(lastSignal!==signal) playBeep("under");
  } else {
    signal="WAIT"; cls="";
  }
  document.getElementById("signal").innerText=signal; 
  document.getElementById("signal").className="signal-box "+cls; 
  lastSignal=signal;
}

// 🔹 Entry Filter & Strongest Entry (after signal displayed)
function updateEntryFilterAndDigit(){
  const last5 = digits.slice(-5);
  document.getElementById("last5").innerText = last5.join(", ") || "-";

  const signalText = document.getElementById("signal").innerText;

  // Reset
  document.getElementById("underFilter").innerText="-";
  document.getElementById("overFilter").innerText="-";
  document.getElementById("entryStrongest").innerText="-";
  document.getElementById("entryStrongest").className="";

  if(signalText.includes("OVER 1")){
    const zeroCount = last5.filter(x => x===0).length;
    const overAllowed = zeroCount===0;
    document.getElementById("overFilter").innerText = overAllowed ? "✅ Allowed" : "❌ Blocked";
    if(overAllowed){
      const entryDigit = last5.includes(5)?5:last5.includes(6)?6:5;
      document.getElementById("entryStrongest").innerText = entryDigit;
      document.getElementById("entryStrongest").className = "enter over";
    }
  } else if(signalText.includes("UNDER 8")){
    const highCount = last5.filter(x => [7,8,9].includes(x)).length;
    const underAllowed = highCount<3;
    document.getElementById("underFilter").innerText = underAllowed ? "✅ Allowed" : "❌ Blocked";
    if(underAllowed){
      const entryDigit = last5.includes(4)?4:last5.includes(9)?9:4;
      document.getElementById("entryStrongest").innerText = entryDigit;
      document.getElementById("entryStrongest").className = "enter under";
    }
  }
}
</script>

</body>
</html>

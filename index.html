<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maven FX PRO Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
  background: linear-gradient(145deg, #0b0f14, #131921);
  color: #e6edf3; 
  zoom: 0.9; 
}
.floating-btn { 
  position: fixed; 
  bottom: 15px; 
  right: 15px; 
  background: #238636; 
  color: white; 
  padding: 12px; 
  border-radius: 50%; 
  cursor: pointer; 
  z-index: 999; 
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  transition: transform 0.2s;
}
.floating-btn:hover { transform: scale(1.1); }
.mini { position: fixed; bottom: 0; left: 0; width: 100%; height: 50vh; overflow-y: auto; z-index: 998; }
.dashboard { 
  display: grid; 
  grid-template-columns: 1fr 1fr; 
  gap: 15px; 
  padding: 15px; 
  min-height: 100vh; 
  max-width: 600px; 
  margin: auto; 
}
.panel { 
  background: linear-gradient(145deg, #161b22, #1d232c);
  padding: 15px; 
  border-radius: 12px; 
  box-shadow: 0 8px 20px rgba(0,0,0,0.6);
  transition: transform 0.2s;
}
.panel:hover { transform: translateY(-2px); }
.full { grid-column: span 2; }
h2 { 
  margin-bottom: 10px; 
  font-size: 17px; 
  font-weight: 600; 
  color: #f0f6fc;
}
select, button { 
  width: 100%; 
  padding: 10px; 
  margin-top: 8px; 
  border-radius: 8px; 
  border: none; 
  font-size: 14px; 
}
button { 
  background: #238636; 
  color: white; 
  cursor: pointer; 
  box-shadow: 0 4px 8px rgba(0,0,0,0.4);
  transition: background 0.2s, transform 0.2s;
}
button:hover { 
  background: #2ea54b; 
  transform: translateY(-2px);
}
.signal-box { 
  text-align: center; 
  font-size: 18px; 
  font-weight: bold; 
  padding: 14px; 
  border-radius: 12px; 
  background: #0d1117; 
  box-shadow: inset 0 0 10px rgba(0,255,0,0.1);
}
.over { color: #ffd700; }
.under { color: #ff7f50; }
.enter.over { color: #32cd32; }
.enter.under { color: #ff4500; }
#stream { 
  margin-top: 8px; 
  background: #0d1117; 
  padding: 10px; 
  border-radius: 8px; 
  height: 60px; 
  overflow-x: auto; 
  white-space: nowrap; 
  font-size: 14px; 
  box-shadow: inset 0 0 5px rgba(255,255,255,0.1);
}
.stat { font-size: 14px; margin-top: 6px; }
.flash { 
  animation: flashAnim 0.8s infinite; 
  font-weight: bold; 
  color: #32cd32;
}
@keyframes flashAnim { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
.panel.full:first-of-type { 
  font-size: 22px; 
  font-weight: 700; 
  text-align: center; 
  background: linear-gradient(135deg, #0b0f14, #1e2733);
  color: #ffd700; 
  margin-bottom: 15px; 
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
@media (max-width: 768px) {
  body { zoom: 0.85; }
  .dashboard { grid-template-columns: 1fr; max-width: 100%; }
  .full { grid-column: span 1; }
}
</style>
</head>
<body>

<div class="panel full">
  💎 Maven FX
</div>

<div id="app" class="dashboard">

  <div class="floating-btn" onclick="toggleMini()">⚡</div>

  <div class="panel">
    <h2>⚙️ Controls</h2>
    <select id="market">
      <option value="R_10">Volatility 10</option>
      <option value="R_25">Volatility 25</option>
      <option value="R_50">Volatility 50</option>
      <option value="R_75">Volatility 75</option>
      <option value="R_100">Volatility 100</option>
      <option value="1HZ10V">V10 (1s)</option>
      <option value="1HZ25V">V25 (1s)</option>
      <option value="1HZ50V">V50 (1s)</option>
      <option value="1HZ75V">V75 (1s)</option>
      <option value="1HZ100V">V100 (1s)</option>
      <option value="JD10">Jump 10</option>
      <option value="JD25">Jump 25</option>
      <option value="JD50">Jump 50</option>
      <option value="JD75">Jump 75</option>
      <option value="JD100">Jump 100</option>
    </select>
    <button onclick="connect()">Connect</button>
    <div class="stat">Status: <span id="status">Disconnected</span></div>
  </div>

  <div class="panel">
    <h2>📊 Market Data</h2>
    <div class="stat">Price: <span id="price">-</span></div>
    <div class="stat">Last Tick Digit: <span id="digit">-</span></div>
    <div class="stat">Cluster: <span id="cluster">-</span></div>
    <div class="stat">Over 1: <span id="over">0%</span></div>
    <div class="stat">Under 8: <span id="under">0%</span></div>
  </div>

  <div class="panel full">
    <h2>🚨 Signal</h2>
    <div id="signal" class="signal-box">WAIT</div>
    <div id="countdown" class="signal-box" style="margin-top:5px; background:#0d1117; font-size:16px; color:#ccc;"></div>
  </div>

  <div class="panel full">
    <h2>🛡️ Entry Filter</h2>
    <div class="stat">Last 5 Digits: <span id="last5">-</span></div>
    <div class="stat">Under 8: <span id="underFilter">-</span></div>
    <div class="stat">Over 1: <span id="overFilter">-</span></div>
  </div>

  <div class="panel full">
    <h2>🎯 Entry Digit</h2>
    <div class="stat">Strongest Entry: <span id="entryStrongest">-</span></div>
  </div>

  <div class="panel full">
    <h2>📈 Digit Stream</h2>
    <div id="stream"></div>
  </div>

  <div class="panel full">
    <h2>📊 Momentum Score</h2>
    <div class="stat">Over 1: <span id="momentumOver">0%</span></div>
    <div style="background:#222; height:10px; border-radius:6px; margin-bottom:6px;">
      <div id="barOver" style="height:100%; width:0%; background:#32cd32; border-radius:6px;"></div>
    </div>
    <div class="stat">Under 8: <span id="momentumUnder">0%</span></div>
    <div style="background:#222; height:10px; border-radius:6px;">
      <div id="barUnder" style="height:100%; width:0%; background:#ff4500; border-radius:6px;"></div>
    </div>
  </div>

</div>

<script>
let ws;
let digits = [];
let counts = Array(10).fill(0);
const maxDigits = 50;
let tickWait = false;
let lastSignal = "";
let lastStrongSetup = ""; 
let beepReady = true;     
let countdownInterval = null;

function updateEntryFilter(){
  const lastFive = digits.slice(-5);
  document.getElementById("last5").innerText = lastFive.join(" ") || "-";

  const signalText = document.getElementById("signal").innerText;
  const isOverSetup = signalText.includes("OVER") || signalText.includes("OVER SETUP");
  const isUnderSetup = signalText.includes("UNDER") || signalText.includes("UNDER SETUP");

  document.getElementById("underFilter").innerText = "-";
  document.getElementById("overFilter").innerText = "-";
  const entrySpan = document.getElementById("entryStrongest");
  entrySpan.innerText = "-";
  entrySpan.classList.remove("flash");

  if(lastFive.length < 5) return;

  const highDigits = lastFive.filter(x=>x >= 7).length;
  const hasZero = lastFive.includes(0);

  let entryAllowed = false;
  let strongestDigit = "-";

  if(isOverSetup){
    entryAllowed = !hasZero;
    document.getElementById("overFilter").innerText = entryAllowed ? "✅ ENTER" : "⛔ DO NOT ENTER";
    const count5 = lastFive.filter(x=>x===5).length;
    const count6 = lastFive.filter(x=>x===6).length;
    strongestDigit = count5 <= count6 ? 5 : 6;
  }

  if(isUnderSetup){
    entryAllowed = highDigits < 3;
    document.getElementById("underFilter").innerText = entryAllowed ? "✅ ENTER" : "⛔ DO NOT ENTER";
    const count4 = lastFive.filter(x=>x===4).length;
    const count5 = lastFive.filter(x=>x===5).length;
    strongestDigit = count4 <= count5 ? 4 : 5;
  }

  if(entryAllowed){
    entrySpan.innerText = strongestDigit;
    entrySpan.classList.add("flash");
  }
}

function playBeep(type){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.type = "sine";
  osc.frequency.setValueAtTime(type==="over"?900:type==="under"?600:750, ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.15);
}

function toggleMini(){ document.getElementById("app").classList.toggle("mini"); }

function connect(){
  const market = document.getElementById("market").value;
  const status = document.getElementById("status");

  if(ws) ws.close();
  digits=[]; counts.fill(0); tickWait=false; lastSignal=""; lastStrongSetup=""; beepReady=true;
  if(countdownInterval){ clearInterval(countdownInterval); countdownInterval=null; }

  status.innerText="Connecting...";
  ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

  ws.onopen = () => {
    status.innerText = "Connected to " + market;
    ws.send(JSON.stringify({ ticks: market, subscribe: 1 }));
  };

  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    if(data.tick){
        const price = data.tick.quote;
        const market = document.getElementById("market").value;

        document.getElementById("price").innerText = price;

        let lastDigit;
        if(market.startsWith("R_")){
            const priceStr = data.tick.quote.toString().replace('.', '');
            lastDigit = parseInt(priceStr.slice(-1), 10);
        } else {
            const priceStr = price.toFixed(2).replace('.', '');
            lastDigit = parseInt(priceStr.slice(-1), 10);
        }

        document.getElementById("digit").innerText = lastDigit;

        updateDigits(lastDigit);
        calculateProbability();
        analyzeMarket();
        updateEntryFilter();
    }
  };

  ws.onerror = () => status.innerText = "❌ Error";
  ws.onclose = () => status.innerText = "Disconnected";
}

document.getElementById("market").addEventListener("change", connect);
window.addEventListener("load", connect);

function updateDigits(d){
  digits.push(d);
  counts[parseInt(d)]++;
  if(digits.length > maxDigits){ 
    const old = digits.shift(); 
    counts[parseInt(old)]--;
  }

  document.getElementById("stream").innerHTML =
    digits.map(x=>x===0?`<span style="color:#00ffff;font-weight:bold;">0</span>`:x).join(" ");

  const recent = digits.slice(-10);
  const high = recent.filter(x=>x>=7).length;
  const low = recent.filter(x=>x<=1).length;

  let cluster = "Mid (2-6)";
  if(high >= 6) cluster = "High (7-9)";
  else if(low >= 6) cluster = "Low (0-1)";
  document.getElementById("cluster").innerText = cluster;
}

function calculateProbability(){
  const total = digits.length || 1;
  const overCount = counts.slice(2).reduce((a,b)=>a+b,0);
  const underCount = counts.slice(0,8).reduce((a,b)=>a+b,0);

  const overProb = (overCount / total) * 100;
  const underProb = (underCount / total) * 100;

  document.getElementById("over").innerText = overProb.toFixed(1)+"%";
  document.getElementById("under").innerText = underProb.toFixed(1)+"%";

  return {overProb, underProb};
}

// 🔹 Momentum Score FIXED
function calculateMomentumScore(){
  const last10 = digits.slice(-10);
  if(last10.length < 5) return {over:0, under:0};

  // ✅ Over 1: digits 4-9, Under 8: digits 0-5
  const overPressure = last10.filter(x => x >= 4 && x <= 9).length;
  const underPressure = last10.filter(x => x >= 0 && x <= 5).length;

  const overScore = Math.min(100, (overPressure / 10) * 100);
  const underScore = Math.min(100, (underPressure / 10) * 100);

  document.getElementById("momentumOver").innerText = overScore.toFixed(0)+"%";
  document.getElementById("barOver").style.width = overScore+"%";

  document.getElementById("momentumUnder").innerText = underScore.toFixed(0)+"%";
  document.getElementById("barUnder").style.width = underScore+"%";

  return {overScore, underScore};
}

function isStrongSetup(prob){ return prob >= 80; }
function checkTrend(recent, type){
  if(recent.length < 3) return false;
  return type==="over"
    ? recent[0] <= recent[1] && recent[1] <= recent[2]
    : recent[0] >= recent[1] && recent[1] >= recent[2];
}

function analyzeMarket(){
  const signal = document.getElementById("signal");

  if(digits.length < 15){
    signal.innerText="⏳ WAIT";
    signal.className="signal-box";
    tickWait=false;
    calculateMomentumScore();
    return;
  }

  const {overProb, underProb} = calculateProbability();
  const {overScore, underScore} = calculateMomentumScore();

  const strongestOver = isStrongSetup(overProb) && overScore>=60;
  const strongestUnder = isStrongSetup(underProb) && underScore>=60;

  const cluster = document.getElementById("cluster").innerText;
  const overOK = (cluster.includes("Mid") || cluster.includes("High"));
  const underOK = (cluster.includes("Low") || cluster.includes("Mid"));

  const recent = digits.slice(-3);

  if(tickWait){
    if((strongestOver && overOK && checkTrend(recent,"over")) ||
       (strongestUnder && underOK && checkTrend(recent,"under"))){

        const entryType = strongestOver ? "over" : "under";
        const lastFive = digits.slice(-5);
        const entryAllowed = entryType==="over"? !lastFive.includes(0) : lastFive.filter(x=>x>=7).length<3;

        if(entryAllowed){
          signal.innerText = strongestOver
            ? `🚀 OVER 1 ENTER (${overProb.toFixed(1)}%)`
            : `🔥 UNDER 8 ENTER (${underProb.toFixed(1)}%)`;
          signal.className = strongestOver ? "signal-box enter over" : "signal-box enter under";
          playBeep("entry");
        } else {
          signal.innerText = "⛔ FILTERED (NO ENTRY)";
          signal.className = "signal-box";
        }
    } else tickWait=false;
    return;
  }

  // 🔹 Main Signal with Strong Setup Beep
  if(strongestOver){
    signal.innerText="🚀 STRONG OVER SETUP";
    signal.className="signal-box over";
    tickWait=true;
    if(beepReady){
        playBeep("over");
        beepReady=false;
        setTimeout(()=>{beepReady=true;},500);
    }
  } else if(strongestUnder){
    signal.innerText="🔥 STRONG UNDER SETUP";
    signal.className="signal-box under";
    tickWait=true;
    if(beepReady){
        playBeep("under");
        beepReady=false;
        setTimeout(()=>{beepReady=true;},500);
    }
  } else {
    signal.innerText="⏳ WAIT";
    signal.className="signal-box";
    tickWait=false;
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maven FX PRO Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(145deg, #0b0f14, #131921); color: #e6edf3; zoom: 0.9; }
.floating-btn { position: fixed; bottom: 15px; right: 15px; background: #238636; color: white; padding: 12px; border-radius: 50%; cursor: pointer; z-index: 999; box-shadow: 0 4px 10px rgba(0,0,0,0.4); transition: transform 0.2s; }
.floating-btn:hover { transform: scale(1.1); }
.mini { position: fixed; bottom: 0; left: 0; width: 100%; height: 50vh; overflow-y: auto; z-index: 998; }
.dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; min-height: 100vh; max-width: 600px; margin: auto; }
.panel { background: linear-gradient(145deg, #161b22, #1d232c); padding: 15px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); transition: transform 0.2s; }
.panel:hover { transform: translateY(-2px); }
.full { grid-column: span 2; }
h2 { margin-bottom: 10px; font-size: 17px; font-weight: 600; color: #f0f6fc; }
select, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: none; font-size: 14px; }
button { background: #238636; color: white; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.4); transition: background 0.2s, transform 0.2s; }
button:hover { background: #2ea54b; transform: translateY(-2px); }
.signal-box { text-align: center; font-size: 18px; font-weight: bold; padding: 14px; border-radius: 12px; background: #0d1117; box-shadow: inset 0 0 10px rgba(0,255,0,0.1); }
.over { color: #ffd700; }
.under { color: #ff7f50; }
.enter.over { color: #32cd32; }
.enter.under { color: #ff4500; }
#stream { margin-top: 8px; background: #0d1117; padding: 10px; border-radius: 8px; height: 60px; overflow-x: auto; white-space: nowrap; font-size: 14px; box-shadow: inset 0 0 5px rgba(255,255,255,0.1); }
.stat { font-size: 14px; margin-top: 6px; }

/* Flash animation */
.signal-box.flash.over { animation: flashOver 0.8s infinite; color: #32cd32; font-weight: bold; }
.signal-box.flash.under { animation: flashUnder 0.8s infinite; color: #ff4500; font-weight: bold; }
@keyframes flashOver { 0%,100% {opacity:1;} 50% {opacity:0.3;} }
@keyframes flashUnder { 0%,100% {opacity:1;} 50% {opacity:0.3;} }

.panel.full:first-of-type { font-size: 22px; font-weight: 700; text-align: center; background: linear-gradient(135deg, #0b0f14, #1e2733); color: #ffd700; margin-bottom: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
@media (max-width: 768px) { body { zoom: 0.85; } .dashboard { grid-template-columns: 1fr; max-width: 100%; } .full { grid-column: span 1; } }
</style>
</head>
<body>

<div class="panel full">💎 Maven FX</div>
<div id="app" class="dashboard">
  <div class="floating-btn" onclick="toggleMini()">⚡</div>

  <div class="panel">
    <h2>⚙️ Controls</h2>
    <select id="market">
      <option value="R_10">Volatility 10</option>
      <option value="R_25">Volatility 25</option>
      <option value="R_50">Volatility 50</option>
      <option value="R_75">Volatility 75</option>
      <option value="R_100">Volatility 100</option>
      <option value="1HZ10V">V10 (1s)</option>
      <option value="1HZ25V">V25 (1s)</option>
      <option value="1HZ50V">V50 (1s)</option>
      <option value="1HZ75V">V75 (1s)</option>
      <option value="1HZ100V">V100 (1s)</option>
      <option value="JD10">Jump 10</option>
      <option value="JD25">Jump 25</option>
      <option value="JD50">Jump 50</option>
      <option value="JD75">Jump 75</option>
      <option value="JD100">Jump 100</option>
    </select>
    <button onclick="connect()">Connect</button>
    <div class="stat">Status: <span id="status">Disconnected</span></div>
  </div>

  <div class="panel">
    <h2>📊 Market Data</h2>
    <div class="stat">Price: <span id="price">-</span></div>
    <div class="stat">Last Tick Digit: <span id="digit">-</span></div>
    <div class="stat">Cluster: <span id="cluster">-</span></div>
    <div class="stat">Over 1: <span id="over">0%</span></div>
    <div class="stat">Under 8: <span id="under">0%</span></div>
  </div>

  <div class="panel full">
    <h2>🚨 Signal</h2>
    <div id="signal" class="signal-box">WAIT</div>
    <div id="spikeIndicator" class="signal-box" style="margin-top:5px; background:#0d1117; font-size:16px; color:#ffd700;">-</div>
  </div>

  <div class="panel full">
    <h2>🛡️ Entry Filter</h2>
    <div class="stat">Last 5 Digits: <span id="last5">-</span></div>
    <div class="stat">Under 8: <span id="underFilter">-</span></div>
    <div class="stat">Over 1: <span id="overFilter">-</span></div>
  </div>

  <div class="panel full">
    <h2>📈 Digit Stream</h2>
    <div id="stream"></div>
  </div>

  <div class="panel full">
    <h2>📊 Momentum Score</h2>
    <div class="stat">Over 1: <span id="momentumOver">0%</span></div>
    <div style="background:#222; height:10px; border-radius:6px; margin-bottom:6px;"><div id="barOver" style="height:100%; width:0%; background:#32cd32; border-radius:6px;"></div></div>
    <div class="stat">Under 8: <span id="momentumUnder">0%</span></div>
    <div style="background:#222; height:10px; border-radius:6px;"><div id="barUnder" style="height:100%; width:0%; background:#ff4500; border-radius:6px;"></div></div>
  </div>

  <div class="panel full">
    <h2>📊 Momentum Graph & Trend</h2>
    <div style="background:#222; height:20px; border-radius:10px; margin-bottom:6px; position:relative;">
      <div id="momentumGraphOver" style="height:100%; width:0%; background:#32cd32; border-radius:10px;"></div>
      <div id="momentumGraphUnder" style="height:100%; width:0%; background:#ff4500; border-radius:10px; position:absolute; top:0; left:0; mix-blend-mode:screen;"></div>
    </div>
    <div class="stat" id="momentumTrend">Trend: -</div>
  </div>
</div>

<script>
let maxDigits=50, adaptiveWindow=15, spikeFactor=1.7;

function toggleMini(){ document.getElementById("app").classList.toggle("mini"); }

function playBeep(type){ const ctx=new (window.AudioContext||window.webkitAudioContext)(); const osc=ctx.createOscillator(); osc.type="sine"; osc.frequency.setValueAtTime(type==="over"?900:type==="under"?600:750,ctx.currentTime); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.15); }

const markets=["R_10","R_25","R_50","R_75","R_100","1HZ10V","1HZ25V","1HZ50V","1HZ75V","1HZ100V","JD10","JD25","JD50","JD75","JD100"];
const marketState={};
const marketWS={};
markets.forEach(m=>marketState[m]={digits:[],counts:Array(10).fill(0),spikeDetected:false,lastSignal:"",beepReady:true});

function detectAdaptiveSpike(state){
    if(state.digits.length < 2) return false;
    const recent = state.digits.slice(-adaptiveWindow);
    const diffs = [];
    for(let i=1;i<recent.length;i++) diffs.push(Math.abs(recent[i]-recent[i-1]));
    const avgDiff = diffs.reduce((a,b)=>a+b,0)/diffs.length;
    const threshold = avgDiff*spikeFactor;
    const spike = Math.abs(recent[recent.length-1]-recent[recent.length-2]) >= threshold;
    state.spikeDetected = spike;
    return spike;
}

function calculateProbability(state){
    const total = state.digits.length || 1;
    const overCount = state.counts.slice(2,10).reduce((a,b)=>a+b,0);
    const underCount = state.counts.slice(0,8).reduce((a,b)=>a+b,0);
    return {overProb:(overCount/total)*100,underProb:(underCount/total)*100};
}

function calculateMomentumScore(state){
    const last10 = state.digits.slice(-10);
    if(last10.length<5) return {overScore:0,underScore:0};
    const overPressure = last10.filter(x=>x>=2&&x<=9).length;
    const underPressure = last10.filter(x=>x>=0&&x<=7).length;
    return {overScore:Math.min(100,(overPressure/10)*100),underScore:Math.min(100,(underPressure/10)*100)};
}

function updateCluster(state){
    const last5=state.digits.slice(-5);
    if(last5.length===0) return "";
    const avg=last5.reduce((a,b)=>a+b,0)/last5.length;
    if(avg<=3) return "Low";
    else if(avg>=7) return "High";
    else return "Mid";
}

function updateEntryFilter(state,signalText){
    const last5=state.digits.slice(-5);
    let underAllowed="-", overAllowed="-";
    if(signalText.includes("OVER 1")) overAllowed=last5.filter(x=>x===0).length===0?"✅ Allowed":"❌ Blocked";
    else if(signalText.includes("UNDER 8")) underAllowed=last5.filter(x=>x>=7).length===0?"✅ Allowed":"❌ Blocked";
    return {underAllowed, overAllowed, last5};
}

function updateDisplay(market, price, lastDigit){
    const state = marketState[market];
    while(state.digits.length >= maxDigits){
        const removed = state.digits.shift();
        if(state.counts[removed] > 0) state.counts[removed]--;
    }
    state.digits.push(lastDigit);
    state.counts[lastDigit]++;

    if(document.getElementById("market").value === market){
        document.getElementById("price").innerText = price;
        document.getElementById("digit").innerText = lastDigit;
        document.getElementById("stream").innerHTML = state.digits.map(x => x===0?`<span style='color:#00ffff;font-weight:bold;'>0</span>`:x).join(" ");

        const spike = detectAdaptiveSpike(state);
        document.getElementById("spikeIndicator").innerText = spike?"⚡ Spike Detected":"-";

        const {overProb, underProb} = calculateProbability(state);
        document.getElementById("over").innerText = overProb.toFixed(1)+"%";
        document.getElementById("under").innerText = underProb.toFixed(1)+"%";

        const {overScore, underScore} = calculateMomentumScore(state);
        document.getElementById("momentumOver").innerText = overScore+"%";
        document.getElementById("barOver").style.width = overScore+"%";
        document.getElementById("momentumUnder").innerText = underScore+"%";
        document.getElementById("barUnder").style.width = underScore+"%";

        const cluster = updateCluster(state);
        document.getElementById("cluster").innerText = cluster;

        const {underAllowed, overAllowed, last5} = updateEntryFilter(state, document.getElementById("signal").innerText);
        document.getElementById("last5").innerText = last5.join(", ");
        document.getElementById("underFilter").innerText = underAllowed;
        document.getElementById("overFilter").innerText = overAllowed;

        let signalText="WAIT", cls="";
        let overReady = overProb >= 80 && overScore >= 60 && !cluster.includes("Low");
        let underReady = underProb >= 80 && underScore >= 60 && !cluster.includes("High");
        if(overReady && underReady) overProb > underProb ? underReady=false : overReady=false;

        if(overReady){
            signalText=`OVER 1 ⚡ (${overProb.toFixed(1)}%)`; cls="flash over";
            if(state.lastSignal!==signalText) playBeep("over");
        } else if(underReady){
            signalText=`UNDER 8 ⚡ (${underProb.toFixed(1)}%)`; cls="flash under";
            if(state.lastSignal!==signalText) playBeep("under");
        } else if((overProb>=70 && overScore>=50)||(underProb>=70 && underScore>=50)){
            signalText=`⚠️ CAUTION (${overProb>underProb?'OVER 1':'UNDER 8'})`; cls=overProb>underProb?"over":"under";
        } else signalText="WAIT";

        document.getElementById("signal").innerText = signalText;
        document.getElementById("signal").className = "signal-box "+cls;
        state.lastSignal = signalText;

        document.getElementById("momentumGraphOver").style.width = overScore+"%";
        document.getElementById("momentumGraphUnder").style.width = underScore+"%";
        const trend = overScore>underScore?"Up":overScore<underScore?"Down":"Sideways";
        document.getElementById("momentumTrend").innerText = "Trend: "+trend;
    }
}

function connectAllMarkets(){
    markets.forEach(market=>{
        const ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");
        marketWS[market]=ws;
        ws.onopen=()=>ws.send(JSON.stringify({ticks:market,subscribe:1}));
        ws.onmessage=msg=>{
            const data=JSON.parse(msg.data);
            if(data.tick){
                const price=data.tick.quote;
                let lastDigit;
                if(market.startsWith("R_")) {
                    const priceStr = price.toString().replace('.', '');
                    lastDigit = parseInt(priceStr[priceStr.length - 1], 10);
                } else if(market.includes("1HZ") || market.includes("JD")) {
                    lastDigit = parseInt(price.toFixed(2).replace('.','').slice(-1),10);
                }
                updateDisplay(market, price, lastDigit);
            }
        };
    });
}

function connect(){ document.getElementById("status").innerText="Connected"; connectAllMarkets(); }
window.addEventListener("load",()=>{ document.getElementById("status").innerText="Connected"; connectAllMarkets(); });

document.getElementById("market").addEventListener("change", e=>{
    const selected=e.target.value;
    const state=marketState[selected];
    if(state.digits.length>0){
        const lastDigit=state.digits[state.digits.length-1];
        const lastPrice=parseFloat(document.getElementById("price").innerText)||0;
        updateDisplay(selected,lastPrice,lastDigit);
    }
});
</script>

</body>
      </html>

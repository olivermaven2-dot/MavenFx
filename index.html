<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maven FX PRO Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
  background: linear-gradient(145deg, #0b0f14, #131921);
  color: #e6edf3; 
  zoom: 0.9; 
}
.floating-btn { 
  position: fixed; 
  bottom: 15px; 
  right: 15px; 
  background: #238636; 
  color: white; 
  padding: 12px; 
  border-radius: 50%; 
  cursor: pointer; 
  z-index: 999; 
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
}
.mini { position: fixed; bottom: 0; left: 0; width: 100%; height: 50vh; overflow-y: auto; z-index: 998; }
.dashboard { 
  display: grid; 
  grid-template-columns: 1fr 1fr; 
  gap: 15px; 
  padding: 15px; 
  min-height: 100vh; 
  max-width: 600px; 
  margin: auto; 
}
.panel { 
  background: linear-gradient(145deg, #161b22, #1d232c);
  padding: 15px; 
  border-radius: 12px; 
  box-shadow: 0 8px 20px rgba(0,0,0,0.6);
}
.full { grid-column: span 2; }
h2 { margin-bottom: 10px; font-size: 17px; }
select, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: none; }
button { background: #238636; color: white; cursor: pointer; }
.signal-box { text-align: center; font-size: 18px; font-weight: bold; padding: 14px; border-radius: 12px; background: #0d1117; }
#stream { margin-top: 8px; background: #0d1117; padding: 10px; border-radius: 8px; height: 60px; overflow-x: auto; white-space: nowrap; }
.stat { font-size: 14px; margin-top: 6px; }
.flash { animation: flashAnim 0.8s infinite; color: #32cd32; }
@keyframes flashAnim { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
</style>
</head>
<body>

<div class="panel full">💎 Maven FX</div>

<div id="app" class="dashboard">

<div class="floating-btn" onclick="toggleMini()">⚡</div>

<div class="panel">
<h2>⚙️ Controls</h2>
<select id="market">
<option value="R_10">Volatility 10</option>
<option value="R_25">Volatility 25</option>
<option value="R_50">Volatility 50</option>
<option value="R_75">Volatility 75</option>
<option value="R_100">Volatility 100</option>
<option value="1HZ10V">V10 (1s)</option>
<option value="1HZ25V">V25 (1s)</option>
<option value="1HZ50V">V50 (1s)</option>
<option value="1HZ75V">V75 (1s)</option>
<option value="1HZ100V">V100 (1s)</option>
<option value="JD10">Jump 10</option>
<option value="JD25">Jump 25</option>
<option value="JD50">Jump 50</option>
<option value="JD75">Jump 75</option>
<option value="JD100">Jump 100</option>
</select>
<button onclick="connect()">Connect</button>
<div class="stat">Status: <span id="status">Disconnected</span></div>
</div>

<div class="panel">
<h2>📊 Market Data</h2>
<div class="stat">Price: <span id="price">-</span></div>
<div class="stat">Last Tick Digit: <span id="digit">-</span></div>
<div class="stat">Cluster: <span id="cluster">-</span></div>
<div class="stat">Over 1: <span id="over">0%</span></div>
<div class="stat">Under 8: <span id="under">0%</span></div>
</div>

<div class="panel full">
<h2>🚨 Signal</h2>
<div id="signal" class="signal-box">WAIT</div>
</div>

<div class="panel full">
<h2>🛡️ Entry Filter</h2>
<div class="stat">Last 5 Digits: <span id="last5">-</span></div>
<div class="stat">Under 8: <span id="underFilter">-</span></div>
<div class="stat">Over 1: <span id="overFilter">-</span></div>
</div>

<div class="panel full">
<h2>🎯 Entry Digit</h2>
<div class="stat">Strongest Entry: <span id="entryStrongest">-</span></div>
</div>

<div class="panel full">
<h2>📈 Digit Stream</h2>
<div id="stream"></div>
</div>

<div class="panel full">
<h2>📊 Momentum Score</h2>
<div class="stat">Over 1: <span id="momentumOver">0%</span></div>
<div id="barOver" style="height:10px;width:0%;background:#32cd32;"></div>
<div class="stat">Under 8: <span id="momentumUnder">0%</span></div>
<div id="barUnder" style="height:10px;width:0%;background:#ff4500;"></div>
</div>

</div>

<script>
let ws;
let digits = [];
let counts = Array(10).fill(0);
const maxDigits = 50;
let lastSignal = "";

// SPIKE FILTER
let lastPrice = null;
const spikeThreshold = 0.5;

function toggleMini(){ document.getElementById("app").classList.toggle("mini"); }

function connect(){
  const market = document.getElementById("market").value;
  const status = document.getElementById("status");

  if(ws) ws.close();
  digits=[]; counts.fill(0); lastPrice=null;

  status.innerText="Connecting...";
  ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

  ws.onopen = () => {
    status.innerText = "Connected to " + market;
    ws.send(JSON.stringify({ ticks: market, subscribe: 1 }));
  };

  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    if(data.tick){
      const price = data.tick.quote;
      document.getElementById("price").innerText = price;

      // SPIKE FILTER
      if(lastPrice !== null){
        const diff = Math.abs(price - lastPrice);
        if(diff > spikeThreshold){
          lastPrice = price;
          return;
        }
      }
      lastPrice = price;

      let lastDigit;
      if(market.startsWith("R_")){
        const str = price.toString().replace('.', '');
        lastDigit = parseInt(str.slice(-1));
      } else {
        const str = price.toFixed(2).replace('.', '');
        lastDigit = parseInt(str.slice(-1));
      }

      document.getElementById("digit").innerText = lastDigit;

      updateDigits(lastDigit);
      calculateProbability();
      analyzeMarket();
      updateEntryFilter();
    }
  };

  ws.onerror = () => status.innerText = "Error";
  ws.onclose = () => status.innerText = "Disconnected";
}

function updateDigits(d){
  digits.push(d);
  counts[d]++;
  if(digits.length > maxDigits){
    const old = digits.shift();
    counts[old]--;
  }

  document.getElementById("stream").innerHTML = digits.join(" ");

  const recent = digits.slice(-10);
  const high = recent.filter(x=>x>=7).length;
  const low = recent.filter(x=>x<=1).length;

  let cluster = "Mid (2-6)";
  if(high >= 6) cluster = "High (7-9)";
  else if(low >= 6) cluster = "Low (0-1)";
  document.getElementById("cluster").innerText = cluster;
}

function calculateProbability(){
  const total = digits.length || 1;
  const over = counts.slice(2).reduce((a,b)=>a+b,0);
  const under = counts.slice(0,8).reduce((a,b)=>a+b,0);

  const overProb = (over/total)*100;
  const underProb = (under/total)*100;

  document.getElementById("over").innerText = overProb.toFixed(1)+"%";
  document.getElementById("under").innerText = underProb.toFixed(1)+"%";

  return {overProb, underProb};
}

function calculateMomentum(){
  const last10 = digits.slice(-10);
  if(last10.length < 5) return {over:0, under:0};

  const over = last10.filter(x=>x>=4).length;
  const under = last10.filter(x=>x<=5).length;

  const o = (over/10)*100;
  const u = (under/10)*100;

  document.getElementById("momentumOver").innerText = o.toFixed(0)+"%";
  document.getElementById("barOver").style.width = o+"%";
  document.getElementById("momentumUnder").innerText = u.toFixed(0)+"%";
  document.getElementById("barUnder").style.width = u+"%";

  return {overScore:o, underScore:u};
}

function analyzeMarket(){
  if(digits.length<15){
    document.getElementById("signal").innerText="WAIT";
    document.getElementById("signal").style.color = "#808080"; // grey
    lastSignal="";
    return;
  }

  const {overProb, underProb}=calculateProbability();
  const {overScore, underScore}=calculateMomentum();
  const cluster = document.getElementById("cluster").innerText;

  const strongestOver = overProb>=80 && overScore>=60;
  const strongestUnder = underProb>=80 && underScore>=60;

  const signalEl = document.getElementById("signal");

  if(strongestOver && !cluster.includes("Low")){
    const sig=`OVER (${overProb.toFixed(1)}%)`;
    signalEl.innerText = sig;
    signalEl.style.color = "#32cd32"; // green
    if(lastSignal!==sig){ beep(900); lastSignal=sig; }
  }
  else if(strongestUnder && !cluster.includes("High")){
    const sig=`UNDER (${underProb.toFixed(1)}%)`;
    signalEl.innerText = sig;
    signalEl.style.color = "#ff4500"; // red
    if(lastSignal!==sig){ beep(600); lastSignal=sig; }
  }
  else{
    signalEl.innerText="WAIT";
    signalEl.style.color = "#808080"; // grey
    lastSignal="";
  }
}

function updateEntryFilter(){
  const last5 = digits.slice(-5);
  document.getElementById("last5").innerText = last5.join(" ");

  const sig = document.getElementById("signal").innerText;
  const entryEl = document.getElementById("entryStrongest");

  // Default: no entry
  entryEl.innerText = "-";
  entryEl.style.color = "#808080"; // grey

  if(sig.includes("OVER")){
    // Over 1: no entry if 0 in last 5
    if(!last5.includes(0)){
      const strongest = last5.includes(5) ? 6 : 5;
      entryEl.innerText = strongest;
      entryEl.style.color = "#32cd32"; // green
    }
  } 
  else if(sig.includes("UNDER")){
    // Under 8: count digits 7,8,9 in last5
    const highDigits = last5.filter(d => d >= 7).length;
    if(highDigits < 3){
      const strongest = last5.includes(4) ? 9 : 4;
      entryEl.innerText = strongest;
      entryEl.style.color = "#32cd32"; // green
    }
  }
}

function beep(freq){
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  osc.frequency.value=freq;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.15);
}

document.getElementById("market").addEventListener("change", connect);
window.onload = connect;
</script>

</body>
</html>

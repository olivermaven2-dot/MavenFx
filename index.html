
    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maven FX </title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial;
  background: #0d1117;
  color: #e6edf3;
}
.dashboard {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 15px;
  min-height: 100vh;
}
.panel {
  background: #161b22;
  padding: 15px;
  border-radius: 12px;
}
.full { grid-column: span 2; }
h2 { margin-bottom: 10px; font-size: 20px; }
select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  font-size: 15px;
}
button {
  background: #238636;
  color: white;
  cursor: pointer;
}
.signal-box {
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  padding: 20px;
  border-radius: 12px;
  background: #0d1117;
}
.over { color: yellow; }
.under { color: orange; }
.enter.over { color: lime; }
.enter.under { color: red; }
#stream {
  margin-top: 10px;
  background: #0d1117;
  padding: 10px;
  border-radius: 8px;
  height: 80px;
  overflow-x: auto;
  white-space: nowrap;
  font-size: 20px;
}
.stat { font-size: 18px; margin-top: 8px; }
@media (max-width: 768px) {
  .dashboard { grid-template-columns: 1fr; }
  .full { grid-column: span 1; }
}
</style>
</head>
<body>

<div class="dashboard">

  <!-- CONTROL PANEL -->
  <div class="panel">
    <h2>⚙️ Controls</h2>
    <select id="market">
      <!-- Volatility indices -->
      <option value="R_10">Volatility 10</option>
      <option value="R_25">Volatility 25</option>
      <option value="R_50">Volatility 50</option>
      <option value="R_75">Volatility 75</option>
      <option value="R_100">Volatility 100</option>
      <option value="1HZ10V">V10 (1s)</option>
      <option value="1HZ25V">V25 (1s)</option>
      <option value="1HZ50V">V50 (1s)</option>
      <option value="1HZ75V">V75 (1s)</option>
      <option value="1HZ100V">V100 (1s)</option>
      <!-- Jump indices -->
      <option value="JD10">Jump 10</option>
      <option value="JD25">Jump 25</option>
      <option value="JD50">Jump 50</option>
      <option value="JD75">Jump 75</option>
      <option value="JD100">Jump 100</option>
    </select>
    <button onclick="connect()">Connect</button>
    <div class="stat">Status: <span id="status">Disconnected</span></div>
  </div>

  <!-- MARKET DATA -->
  <div class="panel">
    <h2>📊 Market Data</h2>
    <div class="stat">Price: <span id="price">-</span></div>
    <div class="stat">Digit: <span id="digit">-</span></div>
    <div class="stat">Cluster: <span id="cluster">-</span></div>
    <div class="stat">Over 1: <span id="over">0%</span></div>
    <div class="stat">Under 8: <span id="under">0%</span></div>
    <div class="stat">Best Over: <span id="safeOver">-</span></div>
    <div class="stat">Best Under: <span id="safeUnder">-</span></div>
  </div>

  <!-- SIGNAL PANEL -->
  <div class="panel full">
    <h2>🚨 Signal</h2>
    <div id="signal" class="signal-box">WAIT</div>
  </div>

  <!-- DIGIT STREAM -->
  <div class="panel full">
    <h2>📈 Digit Stream</h2>
    <div id="stream"></div>
  </div>

</div>

<script>
let ws;
let digits = [];
let counts = Array(10).fill(0);
const maxDigits = 50;

let tickWait = false;
let lastSignal = "";

const overCombos = [[1,3],[2,4],[3,5],[4,6],[5,7],[6,8]];
const underCombos = [[1,6],[2,6],[2,7],[4,7],[5,7]];

function connect(){
  const market = document.getElementById("market").value;
  const status = document.getElementById("status");

  if(ws) ws.close();

  digits=[];
  counts.fill(0);
  tickWait=false;
  lastSignal="";
  document.getElementById("stream").innerText="";

  status.innerText="Connecting...";

  ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

  ws.onopen=()=>{
    status.innerText="Connected to "+market;
    ws.send(JSON.stringify({ticks:market,subscribe:1}));
  };

  ws.onmessage=(msg)=>{
    const data=JSON.parse(msg.data);
    if(data.tick){
      const price=data.tick.quote;
      const lastDigit=parseInt(price.toString().slice(-1));

      document.getElementById("price").innerText=price;
      document.getElementById("digit").innerText=lastDigit;

      updateDigits(lastDigit);
      calculateProbability();
      suggestSafestCombo();
      analyzeMarket();
    }
  };

  ws.onerror=()=> status.innerText="❌ Error";
  ws.onclose=()=> status.innerText="Disconnected";
}

function updateDigits(d){
  digits.push(d);
  counts[d]++;
  if(digits.length>maxDigits){
    const old=digits.shift();
    counts[old]--;
  }
  document.getElementById("stream").innerText=digits.join(" ");

  const recent = digits.slice(-10);
  const high = recent.filter(x=>x>=7).length;
  const low = recent.filter(x=>x<=1).length;

  let cluster="Mid (2-6)";
  if(high>=6) cluster="High (7-9)";
  else if(low>=6) cluster="Low (0-1)";

  document.getElementById("cluster").innerText=cluster;
}

function calculateProbability(){
  const total=digits.length||1;
  const overProb=counts.slice(2).reduce((a,b)=>a+b,0)/total*100;
  const underProb=counts.slice(0,8).reduce((a,b)=>a+b,0)/total*100;

  document.getElementById("over").innerText=overProb.toFixed(1)+"%";
  document.getElementById("under").innerText=underProb.toFixed(1)+"%";

  return {overProb,underProb};
}

function scoreCombo(combo){ return combo.reduce((sum,d)=>sum+counts[d],0); }

function suggestSafestCombo(){
  let bestOver=overCombos[0];
  let bestUnder=underCombos[0];

  overCombos.forEach(c=>{ if(scoreCombo(c)>scoreCombo(bestOver)) bestOver=c; });
  underCombos.forEach(c=>{ if(scoreCombo(c)>scoreCombo(bestUnder)) bestUnder=c; });

  document.getElementById("safeOver").innerText=bestOver.join("-");
  document.getElementById("safeUnder").innerText=bestUnder.join("-");
}

function analyzeMarket(){
  const signal=document.getElementById("signal");

  if(digits.length<15){
    signal.innerText="⏳ WAIT (Collecting)";
    signal.className="signal-box";
    tickWait=false;
    return;
  }

  const {overProb,underProb}=calculateProbability();
  const cluster=document.getElementById("cluster").innerText;

  let overThreshold=80, underThreshold=80;
  if(cluster.includes("High")) underThreshold=75;
  if(cluster.includes("Low")) overThreshold=75;

  const safestOver=document.getElementById("safeOver").innerText.split("-").map(Number);
  const safestUnder=document.getElementById("safeUnder").innerText.split("-").map(Number);
  const lastDigit=digits[digits.length-1];

  const overSignal=overProb>=overThreshold && !cluster.includes("Low") && safestOver.includes(lastDigit);
  const underSignal=underProb>=underThreshold && !cluster.includes("High") && safestUnder.includes(lastDigit);

  if(tickWait){
    if(overSignal){ signal.innerText=`🚀 OVER 1 → ENTER (${overProb.toFixed(1)}%)`; signal.className="signal-box enter over"; if(lastSignal!=="over"){lastSignal="over";} }
    else if(underSignal){ signal.innerText=`🔥 UNDER 8 → ENTER (${underProb.toFixed(1)}%)`; signal.className="signal-box enter under"; if(lastSignal!=="under"){lastSignal="under";} }
    else{ signal.innerText="⏳ WAIT"; signal.className="signal-box"; lastSignal=""; }
    tickWait=false;
    return;
  }

  if(overSignal){ signal.innerText=`🚀 OVER 1 SETUP → WAIT 1 TICK`; signal.className="signal-box over"; tickWait=true; }
  else if(underSignal){ signal.innerText=`🔥 UNDER 8 SETUP → WAIT 1 TICK`; signal.className="signal-box under"; tickWait=true; }
  else{ signal.innerText="⏳ WAIT"; signal.className="signal-box"; tickWait=false; lastSignal=""; }
}
</script>

</body>
</html>
